apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.metadata.name }}
  labels:
    {{- include "nginx-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nginx-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nginx-chart.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        container.apparmor.security.beta.kubernetes.io/nginx-chart: "runtime/default"
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.volumes.hostPath.enabled }}
      volumes:
      - name: {{ .Values.volumes.hostPath.name }}
        emptyDir: {}
      {{- end }}
      containers:
      # Main nginx container with configurable security context from values.yaml
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.containerPort }}
          hostPort: 0
        securityContext:
          privileged: false
          {{- if .Values.securityContext.capabilities }}
          capabilities:
            add:
              - AUDIT_WRITE
              - CHOWN
              - DAC_OVERRIDE
              - FOWNER
              - FSETID
              - KILL
              - MKNOD
              - NET_BIND_SERVICE
              - SETFCAP
              - SETGID
              - SETPCAP
              - SETUID
              - SYS_CHROOT
          {{- end }}
        {{- if .Values.volumes.hostPath.enabled }}
        volumeMounts:
        - name: {{ .Values.volumes.hostPath.name }}
          mountPath: /mnt/host-vol
        {{- end }}
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      
      # Second container with hardcoded security context
      - name: hardcoded-security-container
        image: "alpine:3.18"
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c", "while true; do echo 'Hardcoded security container running'; sleep 30; done"]
        securityContext:
          privileged: false
          capabilities:
            add:
              - NET_ADMIN
              - SYS_TIME
          runAsNonRoot: true
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
