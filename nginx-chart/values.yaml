# Default values for nginx-chart.

replicaCount: 1

metadata:
  name: nginx-helm-demo
  namespace: nginx-helm

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 81
  targetPort: 81

# Security context settings for main container
securityContext:
  privileged: false
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Container port configuration
containerPort: 81
# hostPort: 81  # Disabled for security compliance

# Volume configuration
volumes:
  hostPath:
    enabled: false
    # path: /etc  # Disabled for security compliance
    # name: host-vol

# Pod annotations
podAnnotations: {}
  # container.apparmor.security.beta.kubernetes.io/nginx-chart: unconfined  # Disabled for security compliance

# Resource limits and requests
resources: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# Service account configuration
serviceAccount:
  automountServiceAccountToken: false

# Labels
labels:
  app: nginx
