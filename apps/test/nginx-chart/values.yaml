# Default values for nginx-chart.

replicaCount: 1

metadata:
  name: nginx-helm-demo
  namespace: nginx-helm

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 81
  targetPort: 81

# Security context settings
securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    add: []
    drop:
      - ALL

# Container port configuration
containerPort: 81
hostPort: 0

# Volume configuration
volumes:
  hostPath:
    enabled: false
    path: ""
    name: host-vol
  emptyDir:
    enabled: true
    name: app-vol

# Pod annotations
podAnnotations:

# Pod-level security settings
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  seccompProfile:
    type: RuntimeDefault

# Service account settings
serviceAccount:
  automountServiceAccountToken: false

# Resource limits and requests
resources: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Labels
labels:
  app: nginx
