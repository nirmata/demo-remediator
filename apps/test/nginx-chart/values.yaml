# Default values for nginx-chart.

replicaCount: 1

metadata:
  name: nginx-helm-demo
  namespace: nginx-helm

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 81
  targetPort: 81

# Security context settings
securityContext:
  privileged: false
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

# Container port configuration
containerPort: 81
# hostPort: 81  # Disabled for security compliance

# Volume configuration
volumes:
  hostPath:
    enabled: false
    # path: /etc  # Disabled for security compliance
    # name: host-vol

# Pod annotations
podAnnotations: {}
  # container.apparmor.security.beta.kubernetes.io/nginx-chart: runtime/default

# Resource limits and requests
resources: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Labels
labels:
  app: nginx
