# Default values for nginx-chart.

replicaCount: 1

metadata:
  name: nginx-helm-demo
  namespace: nginx-helm

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 81
  targetPort: 81

# Security context settings
securityContext:
  privileged: false
  capabilities:
    add: []
    drop:
      - ALL
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1001
  seccompProfile:
    type: RuntimeDefault

# Container port configuration
containerPort: 81
hostPort: 0

# Volume configuration
volumes:
  hostPath:
    enabled: false
    path: /etc
    name: host-vol

# Pod annotations
podAnnotations: {}

# Resource limits and requests
resources: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Labels
labels:
  app: nginx

# Pod-level security context
podSecurityContext:
  automountServiceAccountToken: false
  runAsNonRoot: true
  runAsUser: 1001
  seccompProfile:
    type: RuntimeDefault
