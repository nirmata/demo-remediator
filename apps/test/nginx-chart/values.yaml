# Default values for nginx-chart.

replicaCount: 1

metadata:
  name: nginx-helm-demo
  namespace: nginx-helm

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 81
  targetPort: 81

# Security context settings
securityContext:
  privileged: false
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

# Container port configuration
containerPort: 81
hostPort: 0

# Volume configuration
volumes:
  emptyDir:
    enabled: true
    name: empty-vol

# Pod annotations
podAnnotations: {}

# Security settings
automountServiceAccountToken: false

# Resource limits and requests
resources: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Labels
labels:
  app: nginx
