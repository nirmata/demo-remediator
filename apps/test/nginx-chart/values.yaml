# Default values for nginx-chart.

replicaCount: 1

metadata:
  name: nginx-helm-demo
  namespace: nginx-helm

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 81
  targetPort: 81

# Security context settings
securityContext:
  privileged: false
  capabilities:
    add: []
    drop:
      - ALL
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container port configuration
containerPort: 81
hostPort: 0

# Volume configuration
volumes:
  hostPath:
    enabled: false
    path: ""
    name: host-vol
  emptyDir:
    enabled: true
    name: app-data

# Pod annotations
podAnnotations: {}

# Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 3000
  fsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

# Service account settings
serviceAccount:
  automountServiceAccountToken: false

# Resource limits and requests
resources: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Labels
labels:
  app: nginx
