# Default values for nginx-chart.

replicaCount: 1

metadata:
  name: nginx-helm-demo
  namespace: nginx-helm

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 81
  targetPort: 81

# Security context settings
securityContext:
  privileged: false
  capabilities:
    add: []
    drop:
      - ALL

# Container port configuration
containerPort: 81
hostPort: 0

# Volume configuration
volumes:
  hostPath:
    enabled: false
    path: ""
    name: ""
  emptyDir:
    enabled: true
    name: app-vol

# Pod annotations
podAnnotations:
  container.apparmor.security.beta.kubernetes.io/nginx-chart: runtime/default

# Resource limits and requests
resources: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod-level security settings
podSecurityContext:
  automountServiceAccountToken: false
  seccompProfile:
    type: RuntimeDefault
  runAsNonRoot: true

# Additional container security settings
containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Labels
labels:
  app: nginx
