apiVersion: apps/v1
kind: Deployment
metadata:
    namespace: production
    annotations:
        container.apparmor.security.beta.kubernetes.io/nginx: unconfined
    labels:
        app: nginx
        nirmata.io/remediation-path: create-pr
        nirmata.io/resource-optimization: enabled
    name: nginx
spec:
    replicas: 1
    selector:
        matchLabels:
            app: nginx
    template:
        metadata:
            namespace: production
            labels:
                app: nginx
                app.kubernetes.io/name: nginx
        spec:
            securityContext:
                runAsNonRoot: true
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - image: nginx:1.25
                  name: nginx
                  livenessProbe:
                    httpGet:
                        path: /
                        port: 80
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  ports:
                    - containerPort: 80
                  resources:
                    limits:
                        cpu: 5000m
                        memory: 2800Mi
                    requests:
                        cpu: 50m
                        memory: 64Mi
                  securityContext:
                    allowPrivilegeEscalation: false
                    privileged: false
                    readOnlyRootFilesystem: true
                    runAsNonRoot: true
                    seccompProfile:
                        type: RuntimeDefault
                    capabilities:
                        drop:
                            - ALL
                            - CAP_NET_RAW
            volumes:
                - name: host-vol
                  emptyDir: {}
