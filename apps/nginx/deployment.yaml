apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
    nirmata.io/resource-optimization: "enabled"
    nirmata.io/remediation-path: "create-pr"
  annotations:
    container.apparmor.security.beta.kubernetes.io/nginx: unconfined
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: host-vol
        emptyDir: {}
      containers:
      - name: nginx
        image: nginx:latest
        securityContext:
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 80
          hostPort: 80
        securityContext:
          privileged: true
          capabilities:
            add:
            - SYS_ADMIN
