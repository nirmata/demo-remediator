apiVersion: apps/v1
kind: Deployment
metadata:
    annotations:
        container.apparmor.security.beta.kubernetes.io/nginx: unconfined
    labels:
        app: nginx
    name: nginx
    namespace: nginx
spec:
    replicas: 1
    selector:
        matchLabels:
            app: nginx
    template:
        metadata:
            labels:
                app: nginx
        spec:
            containers:
                - image: nginx:latest
                  name: nginx
                  ports:
                    - containerPort: 80
                      hostPort: 80
                  resources:
                    limits:
                        cpu: 300m
                        memory: 256Mi
                    requests:
                        cpu: 150m
                        memory: 128Mi
                  securityContext:
                    capabilities:
                        add:
                            - SYS_ADMIN
                    privileged: true
            volumes:
                - hostPath:
                    path: /etc
                  name: host-vol
